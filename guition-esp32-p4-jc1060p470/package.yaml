# =============================================================================
# PACKAGES - ESPHome include manifest
# =============================================================================
# Load order follows dependencies: device and assets first, then config,
# addons, and screens. Loading screen must be the first page so LVGL shows
# it at startup. Main page (lvgl.yaml) is included after setup screens.
# =============================================================================

packages:
  # ---------------------------------------------------------------------------
  # Device, assets, and LVGL base
  # ---------------------------------------------------------------------------
  device:          !include device/device.yaml
  fonts:           !include assets/fonts.yaml
  icons:           !include assets/icons.yaml
  lvgl_base:       !include device/lvgl_base.yaml
  button_theme:    !include theme/button.yaml
  # ---------------------------------------------------------------------------
  # Configuration (text/select/number components for web UI)
  # ---------------------------------------------------------------------------
  button_config:   !include config/button.yaml
  display_config:  !include config/display.yaml
  # Per-button entity/label/icon (20 slots)
  btn_1:           !include { file: config/button_template.yaml, vars: { num: "1" } }
  btn_2:           !include { file: config/button_template.yaml, vars: { num: "2" } }
  btn_3:           !include { file: config/button_template.yaml, vars: { num: "3" } }
  btn_4:           !include { file: config/button_template.yaml, vars: { num: "4" } }
  btn_5:           !include { file: config/button_template.yaml, vars: { num: "5" } }
  btn_6:           !include { file: config/button_template.yaml, vars: { num: "6" } }
  btn_7:           !include { file: config/button_template.yaml, vars: { num: "7" } }
  btn_8:           !include { file: config/button_template.yaml, vars: { num: "8" } }
  btn_9:           !include { file: config/button_template.yaml, vars: { num: "9" } }
  btn_10:          !include { file: config/button_template.yaml, vars: { num: "10" } }
  btn_11:          !include { file: config/button_template.yaml, vars: { num: "11" } }
  btn_12:          !include { file: config/button_template.yaml, vars: { num: "12" } }
  btn_13:          !include { file: config/button_template.yaml, vars: { num: "13" } }
  btn_14:          !include { file: config/button_template.yaml, vars: { num: "14" } }
  btn_15:          !include { file: config/button_template.yaml, vars: { num: "15" } }
  btn_16:          !include { file: config/button_template.yaml, vars: { num: "16" } }
  btn_17:          !include { file: config/button_template.yaml, vars: { num: "17" } }
  btn_18:          !include { file: config/button_template.yaml, vars: { num: "18" } }
  btn_19:          !include { file: config/button_template.yaml, vars: { num: "19" } }
  btn_20:          !include { file: config/button_template.yaml, vars: { num: "20" } }
  # ---------------------------------------------------------------------------
  # Addons
  # ---------------------------------------------------------------------------
  connectivity:    !include addon/connectivity.yaml
  time_sync:       !include addon/time.yaml
  backlight:       !include addon/backlight.yaml
  bl_schedule:     !include addon/backlight_schedule.yaml
  network:         !include addon/network.yaml
  fw_update:       !include addon/firmware_update.yaml
  # ---------------------------------------------------------------------------
  # Screens (loading must be first page for LVGL startup)
  # ---------------------------------------------------------------------------
  screen_loading:  !include device/screen_loading.yaml
  screen_wifi:     !include device/screen_wifi_setup.yaml
  screen_setup:    !include device/screen_button_setup.yaml
  # ---------------------------------------------------------------------------
  # Main page and dynamic sensor subscriptions (after setup screens)
  # ---------------------------------------------------------------------------
  lvgl:            !include device/lvgl.yaml
  sensors:         !include device/sensors.yaml
