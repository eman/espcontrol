# =============================================================================
# DEVICE - Seeed SenseCAP Indicator hardware definition
# =============================================================================
# Pin assignments, peripherals, and platform config for the SenseCAP Indicator.
# Includes the ESP32-S3 SoC, ST7701S RGB display, FT5X06 touchscreen,
# and PCA9554 IO expander.
# =============================================================================

substitutions:
  espcontrol_component_url: ""
  espcontrol_component_ref: ""

# ---------------------------------------------------------------------------
# ESP32-S3 platform (8MB flash, ESP-IDF framework)
# ---------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      # Allocate mbedTLS buffers from PSRAM so firmware downloads can connect.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

# ---------------------------------------------------------------------------
# External component
# ---------------------------------------------------------------------------
espcontrol:

# ---------------------------------------------------------------------------
# ESPHome core (device name from substitutions)
# ---------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - script.execute: apply_screen_rotation

# ---------------------------------------------------------------------------
# PSRAM (video frame buffer memory)
# ---------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz

# ---------------------------------------------------------------------------
# OTA updates (ESPHome native + HTTP-based)
# ---------------------------------------------------------------------------
ota:
  - platform: esphome
    on_begin:
      then:
        - light.turn_off: display_backlight
  - platform: http_request

# ---------------------------------------------------------------------------
# Shared infrastructure (API, logging, web server, restart button)
# ---------------------------------------------------------------------------
packages:
  core_infra: !include ../../../common/device/core_infra.yaml

# ---------------------------------------------------------------------------
# I2C bus and IO Expander
# ---------------------------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16

# ---------------------------------------------------------------------------
# SPI bus (used for display init sequence)
# ---------------------------------------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48

# ---------------------------------------------------------------------------
# Backlight (LEDC PWM output + monochromatic light entity)
# ---------------------------------------------------------------------------
output:
  - platform: ledc
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: gpio_backlight_pwm
    frequency: 100Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:
        - if:
            condition:
              lambda: |-
                return id(screen_schedule_asleep) ||
                       (id(schedule_enabled).state && !id(ha_time).now().is_valid());
            then:
              - script.execute: backlight_force_display_off
            else:
              - if:
                  condition:
                    lambda: 'return id(screensaver_display_off_active);'
                  then:
                    - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Touchscreen (FT5X06 capacitive, wakes screensaver on touch)
# ---------------------------------------------------------------------------
touchscreen:
  - platform: ft5x06
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO42
    transform:
      mirror_x: true
      mirror_y: true
    on_release:
      - script.execute: screensaver_wake

# ---------------------------------------------------------------------------
# Display (4" 480x480 RGB panel with ST7701S controller)
# ---------------------------------------------------------------------------
display:
  - platform: st7701s
    id: my_display
    auto_clear_enabled: false
    data_rate: 4MHz
    update_interval: never
    spi_mode: MODE3
    color_order: RGB
    dimensions:
      width: 480
      height: 480
    invert_colors: true
    transform:
      mirror_x: true
      mirror_y: true
    cs_pin:
      pca9554: pca9554a_device
      number: 4
    reset_pin:
      pca9554: pca9554a_device
      number: 5
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    init_sequence:
      - 1 # select canned init sequence number 1
      - delay 5ms
      - [ 0xE0, 0x1F ]  # Set sunlight readable enhancement
    data_pins:
      red:
        - GPIO4         #r1
        - GPIO3         #r2
        - GPIO2         #r3
        - GPIO1         #r4
        - GPIO0         #r5
      green:
        - GPIO10        #g0
        - GPIO9         #g1
        - GPIO8         #g2
        - GPIO7         #g3
        - GPIO6         #g4
        - GPIO5         #g5
      blue:
        - GPIO15        #b1
        - GPIO14        #b2
        - GPIO13        #b3
        - GPIO12        #b4
        - GPIO11        #b5

# ---------------------------------------------------------------------------
# LVGL base (display binding, must be before any page definitions)
# ---------------------------------------------------------------------------
lvgl:
  id: main_lvgl
  buffer_size: 25%
  displays: my_display
  touchscreens:
    - touchscreen_id: my_touchscreen
      long_press_time: 3s

script:
  - id: apply_screen_rotation
    then:
      - if:
          condition:
            lambda: 'return id(screen_rotation_select).current_option() == "90";'
          then:
            - lvgl.display.set_rotation: 90
          else:
            - if:
                condition:
                  lambda: 'return id(screen_rotation_select).current_option() == "180";'
                then:
                  - lvgl.display.set_rotation: 180
                else:
                  - if:
                      condition:
                        lambda: 'return id(screen_rotation_select).current_option() == "270";'
                      then:
                        - lvgl.display.set_rotation: 270
                      else:
                        - lvgl.display.set_rotation: 0

select:
  - platform: template
    name: "Screen: Rotation"
    internal: true
    disabled_by_default: true
    id: screen_rotation_select
    entity_category: config
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_value: true
    initial_option: "0"
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    on_value:
      then:
        - script.execute: apply_screen_rotation
