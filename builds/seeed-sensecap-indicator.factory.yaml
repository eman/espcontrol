# =============================================================================
# FACTORY BUILD - Seeed SenseCAP Indicator
# =============================================================================
# Factory image: www.js bundled inline for first-boot web UI access.
# =============================================================================

substitutions:
  firmware_version: "0.0.0"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

packages:
  core: !include seeed-sensecap-indicator.yaml

esphome:
  project:
    name: jtenniswood.espcontrol
    version: "${firmware_version}"

dashboard_import:
  package_import_url: github://jtenniswood/espcontrol/devices/seeed-sensecap-indicator/esphome.yaml@main

web_server:
  port: 80
  version: 3
  js_url: ""
  js_include: "../docs/public/webserver/seeed-sensecap-indicator/www.js"
